name: Release
on:
  push:
    tags:
      - v*
permissions:
  contents: write
  id-token: write
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.15.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Read release metadata
        id: metadata
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const fs = require("node:fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const tag = process.env.GITHUB_REF_NAME;
            const expectedTag = `v${pkg.version}`;

            if (tag !== expectedTag) {
              core.setFailed(`Tag ${tag} does not match package.json version ${expectedTag}.`);
              return;
            }

            core.setOutput("name", pkg.name);
            core.setOutput("version", pkg.version);
            core.setOutput("tag", tag);
            core.setOutput("release_name", `${pkg.name} ${pkg.version}`);
            core.setOutput("prerelease", String(pkg.version.includes("-")));
      - name: Ensure tag is on main
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "Tag $GITHUB_REF_NAME must point to a commit on main." >&2
            exit 1
          }
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run check
      - name: Test
        run: npm test
      - name: Package dry run
        run: npm run pack:dry
      - name: Check npm version
        id: npm
        env:
          PACKAGE_NAME: ${{ steps.metadata.outputs.name }}
          PACKAGE_VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        id: publish
        if: steps.npm.outputs.published == 'false'
        env:
          PACKAGE_NAME: ${{ steps.metadata.outputs.name }}
          PACKAGE_VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          if npm publish --provenance --access public; then
            echo "result=published" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "Publish command returned non-zero, but $PACKAGE_NAME@$PACKAGE_VERSION is now on npm; continuing." >&2
            echo "result=already-visible-after-publish" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          exit 1
      - name: Create GitHub release
        id: release
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PACKAGE_NAME: ${{ steps.metadata.outputs.name }}
          PACKAGE_VERSION: ${{ steps.metadata.outputs.version }}
          RELEASE_NAME: ${{ steps.metadata.outputs.release_name }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          PRERELEASE: ${{ steps.metadata.outputs.prerelease }}
        with:
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");
            const tag = process.env.RELEASE_TAG;
            const body = [
              "## Package",
              `- Name: \`${process.env.PACKAGE_NAME}\``,
              `- Version: \`${process.env.PACKAGE_VERSION}\``,
              `- Tag: \`${tag}\``,
              `- Commit: \`${process.env.GITHUB_SHA}\``,
            ].join("\n");

            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              core.info(`Release already exists: ${existing.html_url}`);
              core.setOutput("created", "false");
              core.setOutput("url", existing.html_url);
              return;
            } catch (error) {
              if (error?.status !== 404) {
                throw error;
              }
            }

            const { data: release } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: process.env.GITHUB_SHA,
              name: process.env.RELEASE_NAME,
              body,
              generate_release_notes: true,
              prerelease: process.env.PRERELEASE === "true",
              make_latest: process.env.PRERELEASE === "true" ? "false" : "true",
            });

            core.setOutput("created", "true");
            core.setOutput("url", release.html_url);
      - name: Release summary
        env:
          PACKAGE_NAME: ${{ steps.metadata.outputs.name }}
          PACKAGE_VERSION: ${{ steps.metadata.outputs.version }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          NPM_ALREADY_PUBLISHED: ${{ steps.npm.outputs.published }}
          NPM_PUBLISH_RESULT: ${{ steps.publish.outputs.result }}
          GH_RELEASE_CREATED: ${{ steps.release.outputs.created }}
          GH_RELEASE_URL: ${{ steps.release.outputs.url }}
        run: |
          {
            printf "## Release\n\n"
            printf -- "- Package: \`%s@%s\`\n" "$PACKAGE_NAME" "$PACKAGE_VERSION"
            printf -- "- Tag: \`%s\`\n" "$RELEASE_TAG"
            printf -- "- npm already published before this run: %s\n" "$NPM_ALREADY_PUBLISHED"
            printf -- "- npm publish step result: %s\n" "${NPM_PUBLISH_RESULT:-skipped}"
            printf -- "- GitHub release created in this run: %s\n" "$GH_RELEASE_CREATED"
            printf -- "- GitHub release: %s\n" "$GH_RELEASE_URL"
          } >> "$GITHUB_STEP_SUMMARY"
